@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

@keyframes confFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes popIn{0%{transform:scale(.88);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes morphBlob{0%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%}50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%}100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes waFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes lineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes statusPulse{0%,100%{opacity:.6}50%{opacity:1}}

/* ═══ TIPOGRAFÍA ═══ */
.serif{font-family:'Cormorant Garamond',serif}
.mono{font-family:'Montserrat',sans-serif;font-variant-numeric:tabular-nums}
.label{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:rgba(200,170,120,.12);border-radius:2px}

/* ═══ INPUTS ═══ */
input,textarea,select{

input:focus,textarea:focus,select:focus{border-color:var(--border-gold2);background:rgba(255,255,255,.05)}
textarea{resize:vertical;min-height:76px;line-height:1.6}
select option{background:#161616}
input::placeholder,textarea::placeholder{color:var(--muted)}

function useFI(){
  const r=useRef(null);
  useEffect(()=>{
    const el=r.current;if(!el)return;
    const ob=new IntersectionObserver(([e])=>{
      if(e.isIntersecting){el.style.opacity="1";el.style.transform="none";}
    },{threshold:.05,rootMargin:"0px 0px -20px 0px"});
    ob.observe(el);return()=>ob.disconnect();
  },[]);
  return r;
}
function FI({children,d=0}){
  const r=useFI();
  return <div ref={r} style={{opacity:0,transform:"translateY(16px)",transition:`opacity .85s cubic-bezier(.16,1,.3,1) ${d}s, transform .85s cubic-bezier(.16,1,.3,1) ${d}s`}}>{children}</div>;
}

/* ═══ SPIN WHEEL ═══ */
function SpinWheel({onResult}){
  const[sp,sSp]=useState(false);const[rot,sRot]=useState(0);const[res,sRes]=useState(null);const cR=useRef(null);const seg=360/WHEEL.length;
  useEffect(()=>{
    const c=cR.current;if(!c)return;const ctx=c.getContext("2d");c.width=260;c.height=260;const cx=130,cy=130,r=122;
    WHEEL.forEach((p,i)=>{
      const sa=(i*seg-90)*Math.PI/180,ea=((i+1)*seg-90)*Math.PI/180;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,ea);ctx.closePath();
      ctx.fillStyle=i%2===0?"rgba(255,255,255,.05)":"rgba(255,255,255,.025)";ctx.fill();
      ctx.strokeStyle="rgba(255,255,255,.06)";ctx.lineWidth=1;ctx.stroke();
      ctx.save();ctx.translate(cx,cy);ctx.rotate(sa+(ea-sa)/2);
      ctx.fillStyle=p.color;ctx.font=`600 9px Montserrat,sans-serif`;ctx.textAlign="center";
      ctx.fillText(p.label,r*.6,3);ctx.restore();
    });
    ctx.beginPath();ctx.arc(cx,cy,18,0,Math.PI*2);ctx.fillStyle="var(--bg)";ctx.fill();
    ctx.strokeStyle="var(--gold)";ctx.lineWidth=1.5;ctx.stroke();
  },[]);
  const spin=()=>{
    if(sp)return;sSp(true);sRes(null);
    const tw=WHEEL.reduce((a,p)=>a+p.w,0);let rn=Math.random()*tw,idx=0;
    for(let i=0;i<WHEEL.length;i++){rn-=WHEEL[i].w;if(rn<=0){idx=i;break;}}
    sRot(r=>r+360*6+(360-idx*seg-seg/2));
    setTimeout(()=>{sSp(false);sRes(WHEEL[idx]);if(onResult)onResult(WHEEL[idx]);},4200);
  };
  return <div style={{textAlign:"center"}}>
    <div style={{fontSize:18,color:"var(--gold)",marginBottom:-8,position:"relative",zIndex:2}}>▼</div>
    <div style={{display:"inline-block",transition:"transform 4.2s cubic-bezier(.17,.67,.12,.99)",transform:`rotate(${rot}deg)`}}>
      <canvas ref={cR} style={{width:260,height:260}}/>
    </div>
    {!res?<div style={{marginTop:14}}><button onClick={spin} disabled={sp} style={{padding:"13px 28px",background:sp?"rgba(200,170,120,.15)":"linear-gradient(135deg,var(--gold),var(--gold2))",color:sp?"var(--muted)":"#000",border:"none",borderRadius:50,fontFamily:"Montserrat,sans-serif",fontSize:11,fontWeight:600,letterSpacing:2.5,textTransform:"uppercase",cursor:sp?"wait":"pointer",transition:"all .3s"}}>{sp?"Girando…":"✦ Girar"}</button></div>
    :<div style={{marginTop:14,padding:"16px 20px",background:"rgba(200,170,120,.06)",borderRadius:14,border:"1px solid rgba(200,170,120,.18)"}}>
      <div className="label" style={{marginBottom:6}}>Premio</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:res.color,fontWeight:300}}>{res.label}</div>
      <div style={{fontSize:11,color:"var(--muted)",marginTop:6,lineHeight:1.5}}>El Dr. García lo aplicará en tu próxima cita.</div>
    </div>}
  </div>;
}

  const totalXP=carrito.reduce((a,i)=>a+i.xp,0);

  const quitar=idx=>setCarrito(c=>c.filter((_,i)=>i!==idx));

  if(paso==="confirmado") return(
    <div style={{padding:"48px 24px",textAlign:"center"}}>

          <div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:22}}>{item.emoji}</span><div><div style={{fontSize:14,color:"var(--text)"}}>{item.nombre}</div><div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Valor: {fmt(item.pesos)}</div></div></div>
          <div style={{textAlign:"right"}}><div style={{fontFamily:"Montserrat,sans-serif",fontSize:14,fontWeight:700,color:"var(--gold)"}}>{item.xp} XP</div><button onClick={()=>quitar(i)} style={{background:"none",border:"none",color:"var(--subtle)",fontSize:10,cursor:"pointer",marginTop:3}}>quitar</button></div>
        </div>)}
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:14}}>
          <div><div className="label" style={{marginBottom:4}}>XP a usar</div><div style={{fontFamily:"Montserrat,sans-serif",fontSize:22,fontWeight:700,color:"var(--gold)"}}>{totalXP.toLocaleString()}</div></div>

      <div style={{display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none",marginBottom:16,paddingBottom:2}}>

  );

function HCModal({onClose,hcStep,setHcStep,hcData,upHC,totalXP,maxXP,mandSec,nextStep,lvlUp}){
  const curSec=HC[hcStep];
  const renderField=f=>{
    const v=hcData[f.k]||(f.t==="multi"?[]:"");
    if(f.t==="multi")return <MultiChk opts={f.opts} sel={v} onChange={v2=>upHC(f.k,v2)}/>;
    if(f.t==="select")return <select value={v} onChange={e=>upHC(f.k,e.target.value)}><option value="">Selecciona…</option>{f.opts.map(o=><option key={o} value={o}>{o}</option>)}</select>;
    if(f.t==="area")return <textarea placeholder={f.ph} value={v} onChange={e=>upHC(f.k,e.target.value)}/>;
    if(f.t==="upload")return <div onClick={()=>upHC(f.k,"ok")} style={{border:"1px dashed rgba(255,255,255,.1)",borderRadius:14,padding:"22px",textAlign:"center",cursor:"pointer",background:v?"rgba(124,182,138,.04)":"transparent",transition:"all .2s"}}><div style={{fontSize:28,marginBottom:8}}>📸</div><div style={{fontSize:12,color:v?"var(--green)":"var(--muted)"}}>{v?"✓ Fotos registradas":"Toca para subir fotos"}</div><div style={{fontSize:10,color:"var(--subtle)",marginTop:4}}>Sin maquillaje · Buena iluminación</div></div>;
    return <input type={f.t||"text"} placeholder={f.ph} value={v} onChange={e=>upHC(f.k,e.target.value)}/>;
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",backdropFilter:"blur(22px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn .22s"}} onClick={onClose}>
      <div style={{width:"100%",maxWidth:430,maxHeight:"94vh",background:"var(--bg2)",borderRadius:"24px 24px 0 0",overflowY:"auto",animation:"slideUp .4s cubic-bezier(.16,1,.3,1)"}} onClick={e=>e.stopPropagation()}>
        {/* Handle */}
        <div style={{padding:"14px 24px 0",display:"flex",justifyContent:"center"}}><div style={{width:38,height:3,background:"rgba(255,255,255,.1)",borderRadius:2}}/></div>

        {/* Header HC — médico, limpio */}
        <div style={{padding:"18px 24px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,animation:lvlUp?"lvlUp 1s":"none"}}>
            <div>
              <div className="label" style={{marginBottom:6,color:curSec.bonus?"#e8c547":"var(--muted)"}}>{curSec.bonus?"Sección opcional":`Sección ${curSec.lv} de ${mandSec.length}`}</div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <span style={{fontSize:22}}>{curSec.icon}</span>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,color:"var(--text)",fontWeight:300}}>{curSec.title}</div>
              </div>
              {curSec.why&&<div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5,paddingLeft:32}}>{curSec.why}</div>}
            </div>
            <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
              <div style={{fontFamily:"Montserrat,sans-serif",fontSize:28,fontWeight:700,color:curSec.bonus?"#e8c547":"var(--gold)",lineHeight:1}}>+{curSec.xp}</div>
              <div className="label" style={{fontSize:7,marginTop:3}}>XP</div>
            </div>
          </div>

          {/* Progreso */}
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:10,color:"var(--muted)"}}>{totalXP} XP acumulados</span><span style={{fontSize:10,color:"var(--gold)"}}>{Math.round((totalXP/maxXP)*100)}%</span></div>
            <div style={{height:2,background:"rgba(255,255,255,.05)",borderRadius:1,overflow:"hidden"}}><div style={{height:"100%",width:`${(totalXP/maxXP)*100}%`,background:"linear-gradient(90deg,var(--gold),var(--green))",borderRadius:1,transition:"width .9s cubic-bezier(.16,1,.3,1)"}}/></div>
          </div>

          {/* Steps indicator */}
          <div style={{display:"flex",gap:3}}>
            {HC.map((s,i)=><div key={i} onClick={()=>setHcStep(i)} style={{flex:1,height:2,borderRadius:1,cursor:"pointer",background:i<hcStep?"var(--green)":i===hcStep?"var(--gold)":s.bonus?"rgba(232,197,71,.12)":"rgba(255,255,255,.06)",transition:"background .25s"}}/>)}
          </div>
        </div>

        <div style={{height:1,background:"var(--border)"}}/>

        {/* Fields */}
        <div style={{padding:"20px 24px"}}>
          {curSec.bonus&&<div style={{padding:"10px 14px",background:"rgba(232,197,71,.05)",border:"1px solid rgba(232,197,71,.15)",borderRadius:10,marginBottom:18,fontSize:11,color:"#e8c547",textAlign:"center"}}>Sección opcional · +{curSec.xp} XP adicionales</div>}
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            {curSec.fields.map((f,i)=><div key={f.k} style={{animation:`fadeUp .3s ${i*.06}s both`}}>
              <label style={{display:"block",fontFamily:"Montserrat,sans-serif",fontSize:9,letterSpacing:2,textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>{f.l}{f.req&&<span style={{color:"var(--gold)",marginLeft:4}}>*</span>}</label>
              {renderField(f)}
            </div>)}
          </div>
        </div>

        {/* Nav buttons */}
        <div style={{padding:"0 24px 36px",display:"flex",gap:10}}>
          {hcStep>0&&<button style={{flex:1,padding:"14px",background:"transparent",border:"1px solid var(--border2)",borderRadius:14,color:"var(--text2)",fontFamily:"Montserrat,sans-serif",fontSize:11,fontWeight:500,letterSpacing:1.5,textTransform:"uppercase",cursor:"pointer"}} onClick={()=>setHcStep(s=>s-1)}>←</button>}
          {hcStep<HC.length-1
            ?<button style={{flex:2,padding:"14px",background:"linear-gradient(135deg,var(--gold),var(--gold2))",color:"#000",border:"none",borderRadius:14,fontFamily:"Montserrat,sans-serif",fontSize:11,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",cursor:"pointer"}} onClick={nextStep}>{curSec.bonus?`+${curSec.xp} XP →`:`Continuar`}</button>
            :<button style={{flex:2,padding:"14px",background:"linear-gradient(135deg,var(--gold),var(--gold2))",color:"#000",border:"none",borderRadius:14,fontFamily:"Montserrat,sans-serif",fontSize:11,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",cursor:"pointer"}} onClick={nextStep}>Completar</button>}
        </div>
        {curSec.bonus&&hcStep<HC.length-1&&<div style={{textAlign:"center",paddingBottom:24,marginTop:-20}}><button style={{background:"none",border:"none",color:"var(--muted)",fontFamily:"Montserrat,sans-serif",fontSize:10,letterSpacing:2,textTransform:"uppercase",cursor:"pointer"}} onClick={()=>setHcStep(s=>s+1)}>Omitir esta sección →</button></div>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   APP PRINCIPAL
═══════════════════════════════════════════════════════════ */
function App(){
  // — estado core —
  const[reg,setReg]=useState(false);
  const[tier,setTier]=useState("none");
  const[pts,setPts]=useState(0);
  const[screen,setScreen]=useState("inicio");

  // — modales —
  const[showReg,setShowReg]=useState(false);
  const[showSub,setShowSub]=useState(false);
  const[showWheel,setShowWheel]=useState(false);
  const[showHC,setShowHC]=useState(false);
  const[showTienda,setShowTienda]=useState(false);

  // — feedback —
  const[conf,setConf]=useState(false);
  const[toast,setToast]=useState(null);

  // — HC state —
  const[hcDone,setHcDone]=useState(false);
  const[hcStep,setHcStep]=useState(0);
  const[hcData,setHcData]=useState({});
  const[lvlUp,setLvlUp]=useState(false);

  // — estado clínico del paciente —
  // Estados: incomplete → ready → reviewing → approved → pending_payment → active
  const clinicStatus=useMemo(()=>{
    if(!reg)return "incomplete";
    if(!hcDone)return "incomplete";
    return "ready"; // se actualizaría desde Firebase en producción
  },[reg,hcDone]);

  const td=TIERS[tier];
  const mandSec=HC.filter(s=>!s.bonus);
  const completedSec=HC.filter(sec=>sec.fields.every(f=>{const v=hcData[f.k];if(f.t==="multi")return v&&v.length>0;if(f.t==="upload")return!!v;return v&&String(v).trim()!==""}));
  const totalXP=completedSec.reduce((a,s)=>a+s.xp,0);
  const maxXP=HC.reduce((a,s)=>a+s.xp,0);
  const curSec=HC[hcStep];

  const nav=s=>{setScreen(s);window.scrollTo(0,0);};
  const boom=msg=>{setConf(true);setTimeout(()=>setConf(false),3200);setToast(msg);setTimeout(()=>setToast(null),3000);};
  const doReg=()=>{setReg(true);setTier("gold");setPts(100);setShowReg(false);boom("¡Bienvenid@ ✦ +100 XP");};
  const doUp=t=>{setTier(t);setShowSub(false);boom(`¡${TIERS[t].name} activado! ${TIERS[t].icon}`);};
  const upHC=(k,v)=>setHcData(d=>({...d,[k]:v}));
  const nextStep=()=>{
    if(hcStep<HC.length-1){setLvlUp(true);setTimeout(()=>setLvlUp(false),1000);setPts(p=>p+curSec.xp);setHcStep(s=>s+1);}
    else{setHcDone(true);setShowHC(false);boom("¡Perfil clínico completo! 🏆");setPts(p=>p+curSec.xp+200);}
  };

  // Vista tienda a pantalla completa
  if(showTienda&&reg) return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"var(--bg)"}}>
      <div class="grain"/>
      <div style={{position:"sticky",top:0,zIndex:50,padding:"14px 24px",background:"rgba(6,6,6,.96)",backdropFilter:"blur(24px)",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"var(--text)"}}>Dr. Héctor <em style={{color:"var(--gold)"}}>García</em></div>
        <div style={{fontFamily:"Montserrat,sans-serif",fontSize:9,color:"var(--gold)",letterSpacing:1}}>🪙 {pts.toLocaleString()} XP</div>
      </div>
      <TiendaXP xp={pts} onCanje={x=>{setPts(p=>p-x);boom("¡Canje registrado! 🎉");}} onBack={()=>setShowTienda(false)}/>
    </div>
  );

  // Pantallas principales
  const SCREENS={
    inicio:<HomeScreen reg={reg} tier={tier} hcDone={hcDone} hcStep={hcStep} totalXP={totalXP} maxXP={maxXP} setShowHC={setShowHC} setShowReg={()=>setShowReg(true)} nav={nav} boom={boom}/>,
    tratamientos:<TratamientosScreen reg={reg} setShowReg={()=>setShowReg(true)} nav={nav}/>,
    perfil:<PerfilScreen reg={reg} pts={pts} tier={tier} hcDone={hcDone} hcStep={hcStep} totalXP={totalXP} maxXP={maxXP} hcData={hcData} setShowHC={setShowHC} setShowSub={setShowSub} nav={nav} clinicStatus={clinicStatus} setShowTienda={()=>setShowTienda(true)}/>,
    agenda:<AgendaScreen reg={reg} hcDone={hcDone} setShowHC={setShowHC} setShowReg={()=>setShowReg(true)} nav={nav} boom={boom}/>,
    miplan:<MiPlanScreen reg={reg} pts={pts} tier={tier} setShowSub={()=>setShowSub(true)} setShowReg={()=>setShowReg(true)} setShowWheel={()=>setShowWheel(true)} setShowTienda={()=>setShowTienda(true)} hcDone={hcDone} nav={nav}/>
  };

  return(
    <React.Fragment>
      <Confetti active={conf}/>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}

      <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"var(--bg)"}}>

        {/* ── TOPBAR ── */}
        <div style={{position:"sticky",top:0,zIndex:50,padding:"13px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(6,6,6,.95)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:"1px solid var(--border)"}}>
          <div onClick={()=>nav("inicio")} style={{cursor:"pointer"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"var(--text)",letterSpacing:-.01}}>Dr. Héctor <em style={{color:"var(--gold)"}}>García</em></div>
            {reg&&<div style={{fontFamily:"Montserrat,sans-serif",fontSize:8,color:"var(--gold)",letterSpacing:2,marginTop:1}}>{pts.toLocaleString()} XP · {td.icon} {td.name}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{fontSize:8,color:"var(--subtle)",fontFamily:"Montserrat,sans-serif",lineHeight:1.4,textAlign:"right"}}>Céd. Prof.<br/><span style={{color:"var(--muted)"}}>12532527</span></div>
            {reg
              ?<button onClick={()=>nav("perfil")} style={{width:32,height:32,borderRadius:"50%",background:`${td.color}12`,border:`1px solid ${td.color}30`,color:td.color,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Montserrat,sans-serif"}}>{td.icon}</button>
              :<button onClick={()=>setShowReg(true)} style={{padding:"7px 14px",background:"transparent",border:"1px solid var(--border-gold)",borderRadius:50,color:"var(--gold)",fontFamily:"Montserrat,sans-serif",fontSize:9,fontWeight:500,letterSpacing:2,textTransform:"uppercase",cursor:"pointer"}}>Entrar</button>}
          </div>
        </div>

        {/* HC Banner (solo home, solo incompleto) */}
        {reg&&!hcDone&&screen==="inicio"&&<div onClick={()=>setShowHC(true)} style={{margin:"10px 20px 0",padding:"12px 16px",background:"rgba(200,170,120,.04)",border:"1px solid var(--border-gold)",borderRadius:14,cursor:"pointer",animation:"glow 5s ease infinite"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
            <span style={{fontFamily:"Montserrat,sans-serif",fontSize:10,fontWeight:500,color:"var(--gold)",letterSpacing:1}}>Completar historia clínica</span>
            <span style={{fontFamily:"Montserrat,sans-serif",fontSize:9,color:"var(--muted)"}}>Sección {hcStep+1} / {HC.length}</span>
          </div>
          <div style={{height:2,background:"rgba(255,255,255,.05)",borderRadius:1,overflow:"hidden"}}><div style={{height:"100%",width:`${(totalXP/maxXP)*100}%`,background:"linear-gradient(90deg,var(--gold),var(--green))",borderRadius:1,transition:"width .8s"}}/></div>
        </div>}

        {/* Pantalla activa */}
        {SCREENS[screen]}

        {/* ── BOTTOM NAV ── */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(6,6,6,.97)",backdropFilter:"blur(24px)",borderTop:"1px solid var(--border)",zIndex:40}}>
          <div style={{display:"flex",justifyContent:"space-around",padding:"8px 4px max(8px,env(safe-area-inset-bottom))"}}>
            {[
              {i:"⌂",l:"Inicio",s:"inicio"},
              {i:"◎",l:"Trat.",s:"tratamientos"},
              {i:"○",l:"Perfil",s:"perfil"},
              {i:"⊕",l:"Agenda",s:"agenda"},
              {i:"◈",l:"Mi plan",s:"miplan"}
            ].map(n=>(
              <button key={n.l} onClick={()=>nav(n.s)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"4px 10px",border:"none",background:"none",cursor:"pointer",minWidth:56}}>
                <span style={{fontSize:15,color:screen===n.s?"var(--gold)":"var(--subtle)",transition:"color .2s",fontFamily:"Montserrat,sans-serif"}}>{n.i}</span>
                <span style={{fontFamily:"Montserrat,sans-serif",fontSize:7,letterSpacing:1,textTransform:"uppercase",color:screen===n.s?"var(--gold)":"var(--subtle)"}}>{n.l}</span>
              </button>
            ))}
          </div>
          {/* CTA persistente Agendar */}
          {(screen==="inicio"||screen==="tratamientos")&&reg&&hcDone&&<div style={{padding:"0 16px max(12px,env(safe-area-inset-bottom))",borderTop:"1px solid var(--border)"}}>
            <button onClick={()=>nav("agenda")} style={{width:"100%",padding:"12px",background:"linear-gradient(135deg,var(--gold),var(--gold2))",color:"#000",border:"none",borderRadius:12,fontFamily:"Montserrat,sans-serif",fontSize:10,fontWeight:600,letterSpacing:2.5,textTransform:"uppercase",cursor:"pointer"}}>✦ Agendar valoración</button>
          </div>}
        </div>

        {/* ── WHATSAPP ── */}
        <a href="https://wa.me/528112345678" target="_blank" rel="noopener" style={{position:"fixed",bottom:screen==="inicio"&&reg&&hcDone?116:82,right:14,zIndex:60,width:46,height:46,borderRadius:"50%",background:"#25D366",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,textDecoration:"none",boxShadow:"0 4px 20px rgba(37,211,102,.32)",animation:"waFloat 3s ease-in-out infinite"}}>💬</a>

        {/* ═══ MODALES ═══ */}

        {/* REGISTRO */}
        {showReg&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",backdropFilter:"blur(22px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn .22s"}} onClick={()=>setShowReg(false)}>
          <div style={{width:"100%",maxWidth:430,maxHeight:"92vh",background:"var(--bg2)",borderRadius:"24px 24px 0 0",padding:"20px 24px 40px",overflowY:"auto",animation:"slideUp .4s cubic-bezier(.16,1,.3,1)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:20}}><div style={{width:38,height:3,background:"rgba(255,255,255,.1)",borderRadius:2}}/></div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,color:"var(--text)",marginBottom:6,fontWeight:300}}>Bienvenid@</div>
            <div style={{fontSize:13,color:"var(--muted)",marginBottom:24,lineHeight:1.65}}>Crea tu perfil clínico. Sin costos hasta que el Dr. revise y apruebe tu consulta.</div>
            {[{l:"Nombre completo",p:"María López",t:"text"},{l:"WhatsApp",p:"+52 81 1234 5678",t:"tel"},{l:"Email",p:"tu@email.com",t:"email"},{l:"Ciudad de residencia",p:"Monterrey",t:"text"}].map(f=><div key={f.l} style={{marginBottom:14}}>
              <label style={{display:"block",fontFamily:"Montserrat,sans-serif",fontSize:9,letterSpacing:2,textTransform:"uppercase",color:"var(--muted)",marginBottom:7}}>{f.l}</label>
              <input type={f.t} placeholder={f.p}/>
            </div>)}
            <div style={{marginBottom:20}}>
              <label style={{display:"block",fontFamily:"Montserrat,sans-serif",fontSize:9,letterSpacing:2,textTransform:"uppercase",color:"var(--muted)",marginBottom:7}}>Código de referido (opcional)</label>
              <input placeholder="HG-XXXX"/>
            </div>
            <button style={{width:"100%",padding:"15px",background:"linear-gradient(135deg,var(--gold),var(--gold2))",color:"#000",border:"none",borderRadius:14,fontFamily:"Montserrat,sans-serif",fontSize:11,fontWeight:600,letterSpacing:2.5,textTransform:"uppercase",cursor:"pointer",animation:"breathe 3s ease infinite",marginBottom:12}} onClick={doReg}>✦ Crear perfil clínico</button>
            <p style={{textAlign:"center",fontSize:10,color:"var(--subtle)",lineHeight:1.6}}>🔒 Tus datos están protegidos conforme a la LFPDPPP.<br/>Uso exclusivo del Dr. García.</p>
          </div>
        </div>}

        {/* HC */}
        {showHC&&reg&&<HCModal onClose={()=>setShowHC(false)} hcStep={hcStep} setHcStep={setHcStep} hcData={hcData} upHC={upHC} totalXP={totalXP} maxXP={maxXP} mandSec={mandSec} nextStep={nextStep} lvlUp={lvlUp}/>}

        {/* SUBS */}
        {showSub&&reg&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",backdropFilter:"blur(22px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn .22s"}} onClick={()=>setShowSub(false)}>
          <div style={{width:"100%",maxWidth:430,background:"var(--bg2)",borderRadius:"24px 24px 0 0",padding:"20px 24px 44px",animation:"slideUp .4s cubic-bezier(.16,1,.3,1)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:20}}><div style={{width:38,height:3,background:"rgba(255,255,255,.1)",borderRadius:2}}/></div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:"var(--text)",marginBottom:6,fontWeight:300}}>Planes de suscripción</div>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:20,lineHeight:1.65}}>Primero la atención médica, los beneficios son el complemento.</div>
            <ClinicalDisclaimer text="La suscripción incluye beneficios clínicos reales, no solo descuentos. El Dr. García estará disponible para tu seguimiento continuo."/>
            <div style={{height:16}}/>
            {["gold","platinum","diamond"].map(t=><div key={t} style={{padding:"18px",background:tier===t?`${TIERS[t].color}07`:"var(--bg3)",border:`1px solid ${tier===t?TIERS[t].color+"45":"var(--border)"}`,borderRadius:16,marginBottom:10,cursor:"pointer",transition:"all .2s"}} onClick={()=>doUp(t)}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontFamily:"Montserrat,sans-serif",fontSize:22,color:TIERS[t].color}}>{TIERS[t].icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"Montserrat,sans-serif",fontSize:13,fontWeight:600,color:TIERS[t].color}}>{TIERS[t].name}</div>
                  <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{TIERS[t].perk}</div>
                </div>
                <div style={{fontFamily:"Montserrat,sans-serif",fontSize:15,fontWeight:600,color:TIERS[t].color}}>{fmt(TIERS[t].price)}<span style={{fontSize:9,color:"var(--subtle)"}}>/m</span></div>
              </div>
              {tier===t&&<div style={{marginTop:8,textAlign:"center",fontSize:9,color:TIERS[t].color,fontFamily:"Montserrat,sans-serif",letterSpacing:1}}>✦ Plan actual</div>}
            </div>)}
          </div>
        </div>}

        {/* RULETA */}
        {showWheel&&reg&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",backdropFilter:"blur(22px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn .22s"}} onClick={()=>setShowWheel(false)}>
          <div style={{width:"100%",maxWidth:430,background:"var(--bg2)",borderRadius:"24px 24px 0 0",padding:"24px 24px 44px",animation:"slideUp .4s cubic-bezier(.16,1,.3,1)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><div style={{width:38,height:3,background:"rgba(255,255,255,.1)",borderRadius:2}}/></div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:"var(--text)",textAlign:"center",marginBottom:6,fontWeight:300}}>Ruleta mensual</div>
            <div style={{fontSize:12,color:"var(--muted)",textAlign:"center",marginBottom:20}}>Un giro por mes · Premios reales</div>
            <SpinWheel onResult={r=>{if(r.label!=="Sigue así ✦")boom(`¡${r.label}! El Dr. lo aplicará en tu próxima cita.`);}}/>
          </div>
        </div>}

      </div>
    </React.Fragment>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
